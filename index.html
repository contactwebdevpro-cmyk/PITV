<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiTV Lite</title>
<style>
/* ── ZERO animations, zero backdrop-filter, zero transforms, zero Google Fonts ── */
:root {
  --bg:    #0a0c10;
  --bg2:   #111418;
  --bg3:   #181c22;
  --line:  #252930;
  --acc:   #00d4e8;
  --acc2:  #ff5533;
  --txt:   #d8dce6;
  --dim:   #6b7585;
  --faint: #2e3340;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  /* Polices système = zéro requête réseau, rendu natif */
  font-family: ui-monospace, 'Courier New', monospace;
  font-size: 14px;
  background: var(--bg);
  color: var(--txt);
  /* Désactive le lissage subpixel (coûteux sur Pi) */
  -webkit-font-smoothing: none;
}

/* ── LAYOUT ────────────────────────────────────────────────────────── */
#app {
  display: grid;
  grid-template-rows: 44px 1fr;
  grid-template-columns: 180px 1fr;
  height: 100vh;
}

/* ── HEADER ──────────────────────────────────────────────────────────
   AUCUN backdrop-filter, AUCUN blur, fond plein */
header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 12px;
  background: var(--bg2);
  border-bottom: 1px solid var(--line);
  height: 44px;
}

.logo {
  font-size: 16px;
  font-weight: bold;
  color: var(--acc);
  letter-spacing: 2px;
  flex-shrink: 0;
  white-space: nowrap;
}

#search {
  flex: 1;
  max-width: 320px;
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 4px 8px;
  color: var(--txt);
  font-family: inherit;
  font-size: 13px;
  outline: none;
}
#search:focus { border-color: var(--acc); }
#search::placeholder { color: var(--faint); }

#clock {
  margin-left: auto;
  font-size: 15px;
  color: var(--txt);
  flex-shrink: 0;
}

#ch-count {
  font-size: 11px;
  color: var(--dim);
  flex-shrink: 0;
}

.hbtn {
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 4px 8px;
  color: var(--dim);
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  flex-shrink: 0;
}
.hbtn:hover { color: var(--acc); border-color: var(--acc); }

/* ── SIDEBAR ─────────────────────────────────────────────────────────
   Liste simple, aucun effet */
#sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--line);
  overflow-y: auto;
  /* Scrollbar fine */
  scrollbar-width: thin;
  scrollbar-color: var(--line) transparent;
}
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-thumb { background: var(--line); }

.sidebar-label {
  padding: 8px 10px 4px;
  font-size: 10px;
  color: var(--faint);
  letter-spacing: 2px;
  text-transform: uppercase;
  border-bottom: 1px solid var(--line);
}

.nav-item, .cat-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  font-size: 13px;
  color: var(--dim);
  cursor: pointer;
  border-bottom: 1px solid var(--faint);
  /* PAS de transition — coûteuse sur Pi */
}
.nav-item:hover, .cat-item:hover { color: var(--txt); background: var(--bg3); }
.nav-item.active { color: var(--acc); background: var(--bg3); border-left: 2px solid var(--acc); }
.cat-item.active { color: var(--acc); }

.cat-count {
  margin-left: auto;
  font-size: 10px;
  color: var(--faint);
}

/* ── CONTENT ─────────────────────────────────────────────────────────*/
#content {
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--line) transparent;
}
#content::-webkit-scrollbar { width: 4px; }
#content::-webkit-scrollbar-thumb { background: var(--line); }

/* ── CHANNEL LIST (liste verticale, PAS de grille)
   La grille avec images = reflow constant = lag sur Pi
   On utilise une liste plate, images désactivables ────────────────── */
#channels-wrap {
  padding: 8px;
}

.section-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 4px;
  margin-bottom: 6px;
  border-bottom: 1px solid var(--line);
}
.section-bar-title {
  font-size: 13px;
  color: var(--acc);
  letter-spacing: 1px;
}
.section-bar-count {
  font-size: 11px;
  color: var(--dim);
}

/* Chaque chaîne = une ligne plate, aucun effet 3D */
.ch-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-bottom: 1px solid var(--faint);
  cursor: pointer;
  /* will-change: none — évite les couches GPU inutiles */
}
.ch-row:hover { background: var(--bg3); }
.ch-row.playing { border-left: 2px solid var(--acc); background: var(--bg2); }

/* Logo : taille fixe, chargement lazy, pas de drop-shadow */
.ch-logo {
  width: 32px;
  height: 20px;
  object-fit: contain;
  background: var(--bg3);
  flex-shrink: 0;
  border-radius: 2px;
}
.ch-initial {
  width: 32px;
  height: 20px;
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: 2px;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--dim);
}

.ch-name {
  flex: 1;
  font-size: 13px;
  color: var(--txt);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ch-group {
  font-size: 11px;
  color: var(--faint);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100px;
}
.ch-fav {
  color: var(--faint);
  cursor: pointer;
  padding: 0 4px;
  font-size: 14px;
  flex-shrink: 0;
}
.ch-fav.on { color: var(--acc2); }

/* Pagination */
#pagination {
  padding: 10px;
  display: flex;
  gap: 8px;
  justify-content: center;
  border-top: 1px solid var(--line);
}
.page-btn {
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 5px 14px;
  color: var(--dim);
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
}
.page-btn:hover { color: var(--acc); border-color: var(--acc); }
.page-btn.current { color: var(--acc); border-color: var(--acc); }

#page-info {
  font-size: 11px;
  color: var(--dim);
  display: flex;
  align-items: center;
}

/* ── MESSAGE ÉTATS ───────────────────────────────────────────────────*/
.msg {
  padding: 40px 20px;
  text-align: center;
  color: var(--dim);
  font-size: 13px;
}
.msg b { color: var(--acc); }

/* ── PLAYER ──────────────────────────────────────────────────────────
   Plein écran, fond noir, contrôles simples */
#player {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 100;
  flex-direction: column;
}
#player.on { display: flex; }

#video-el {
  flex: 1;
  width: 100%;
  display: block;
  background: #000;
}

#player-bar {
  background: var(--bg2);
  border-top: 1px solid var(--line);
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

#player-info {
  flex: 1;
  overflow: hidden;
}
#player-name {
  font-size: 14px;
  color: var(--txt);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#player-meta {
  font-size: 11px;
  color: var(--dim);
}

.pbtn {
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 5px 10px;
  color: var(--txt);
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  flex-shrink: 0;
}
.pbtn:hover { color: var(--acc); border-color: var(--acc); }
.pbtn.accent { color: var(--acc); border-color: var(--acc); }

#vol-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
#vol-wrap span { font-size: 11px; color: var(--dim); min-width: 24px; text-align: right; }
#vol {
  width: 80px;
  accent-color: var(--acc);
  cursor: pointer;
}

/* Spinner ultra-simple (1 seul élément, CSS pur) */
#spinner {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  width: 28px;
  height: 28px;
  margin: -14px 0 0 -14px;
  border: 3px solid var(--line);
  border-top-color: var(--acc);
  border-radius: 50%;
  /* animation légère : 1 seul élément, pas de will-change */
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#player.loading #spinner { display: block; }

#player-err {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: var(--dim);
  font-size: 13px;
}
#player.error #player-err { display: block; }

/* ── SETTINGS OVERLAY ────────────────────────────────────────────────*/
#settings {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.8);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
#settings.on { display: flex; }

#settings-box {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 4px;
  width: 460px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
}
.sth {
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 10px;
}
.sth-title { flex: 1; color: var(--acc); font-size: 14px; letter-spacing: 1px; }
.stb { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.stb::-webkit-scrollbar { width: 3px; }
.stb::-webkit-scrollbar-thumb { background: var(--line); }

.st-row { display: flex; align-items: center; gap: 10px; }
.st-label { flex: 1; font-size: 12px; color: var(--dim); }
.st-label b { display: block; color: var(--txt); font-size: 13px; margin-bottom: 2px; }

.st-input {
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 4px 8px;
  color: var(--txt);
  font-family: inherit;
  font-size: 12px;
  flex: 1;
  outline: none;
}
.st-input:focus { border-color: var(--acc); }

.preset-btn {
  display: block;
  width: 100%;
  margin-bottom: 4px;
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 5px 10px;
  color: var(--dim);
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  text-align: left;
}
.preset-btn:hover { border-color: var(--acc); color: var(--txt); }

.stf {
  padding: 10px 14px;
  border-top: 1px solid var(--line);
  display: flex;
  gap: 8px;
}
.stf button {
  flex: 1;
  padding: 7px;
  border-radius: 3px;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
}
.btn-save { background: var(--acc); border: 1px solid var(--acc); color: #000; font-weight: bold; }
.btn-cancel { background: var(--bg3); border: 1px solid var(--line); color: var(--dim); }

/* ── NOTIFICATION ────────────────────────────────────────────────────
   Sans animation slide pour économiser le repaint */
#notif {
  position: fixed;
  bottom: 14px;
  right: 14px;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-left: 3px solid var(--acc);
  border-radius: 3px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--txt);
  z-index: 999;
  display: none;
  max-width: 300px;
}
#notif.on { display: block; }
#notif-sub { color: var(--dim); font-size: 11px; margin-top: 2px; }

/* ── BOOT ─────────────────────────────────────────────────────────────
   Ultra-minimaliste : 1 div, 1 animation, pas de particules */
#boot {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.boot-logo {
  font-size: 48px;
  color: var(--acc);
  letter-spacing: 6px;
  margin-bottom: 24px;
}
.boot-bar-wrap {
  width: 220px;
  height: 2px;
  background: var(--bg3);
  border-radius: 1px;
}
.boot-bar {
  height: 100%;
  background: var(--acc);
  border-radius: 1px;
  width: 0;
  /* transition CSS simple : 1 propriété */
  transition: width .3s linear;
}
.boot-status {
  font-size: 11px;
  color: var(--faint);
  margin-top: 8px;
  height: 16px;
  letter-spacing: 1px;
}

/* ── TOUCHES DE RACCOURCI (affichage dans player bar) ── */
.kbd {
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: 2px;
  padding: 1px 5px;
  font-size: 10px;
  color: var(--faint);
}

/* ── FIX IMAGE ICONS ── */
.fav-star { display: inline; }
</style>
</head>
<body>

<!-- BOOT -->
<div id="boot">
  <div class="boot-logo">PiTV</div>
  <div class="boot-bar-wrap"><div class="boot-bar" id="bbar"></div></div>
  <div class="boot-status" id="bstatus">Démarrage...</div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header>
    <div class="logo">PiTV</div>
    <input type="text" id="search" placeholder="Rechercher..." autocomplete="off" spellcheck="false">
    <div id="ch-count" style="display:none"></div>
    <div id="clock">--:--</div>
    <button class="hbtn" id="settings-btn">Param.</button>
    <button class="hbtn" id="refresh-btn">Recharger</button>
  </header>

  <nav id="sidebar">
    <div class="sidebar-label">Menu</div>
    <div class="nav-item active" data-view="all">📡 Toutes</div>
    <div class="nav-item" data-view="favorites">★ Favoris</div>
    <div class="nav-item" data-view="recent">◷ Récents</div>
    <div class="sidebar-label" style="margin-top:4px">Catégories</div>
    <div id="cats"></div>
  </nav>

  <main id="content">
    <div id="channels-wrap">
      <div class="msg" id="msg-loading">Chargement des chaînes...</div>
      <div class="section-bar" id="section-bar" style="display:none">
        <span class="section-bar-title" id="sec-title">Toutes les chaînes</span>
        <span class="section-bar-count" id="sec-count"></span>
      </div>
      <div id="ch-list"></div>
      <div id="pagination" style="display:none"></div>
    </div>
  </main>
</div>

<!-- PLAYER -->
<div id="player">
  <div id="spinner"></div>
  <div id="player-err">
    <div style="font-size:28px;margin-bottom:8px">📡</div>
    <div id="err-msg">Flux indisponible</div>
    <div style="margin-top:10px;display:flex;gap:8px;justify-content:center">
      <button class="pbtn" onclick="retryStream()">Réessayer</button>
      <button class="pbtn" onclick="nextCh()">Suivant</button>
      <button class="pbtn" onclick="closePlayer()">Fermer</button>
    </div>
  </div>
  <video id="video-el" autoplay playsinline></video>
  <div id="player-bar">
    <button class="pbtn" onclick="closePlayer()">← Retour</button>
    <div id="player-info">
      <div id="player-name">—</div>
      <div id="player-meta"></div>
    </div>
    <button class="pbtn" id="pp-btn" onclick="togglePP()">⏸</button>
    <button class="pbtn" onclick="prevCh()">⏮</button>
    <button class="pbtn" onclick="nextCh()">⏭</button>
    <button class="pbtn" id="fav-btn" onclick="toggleFavCurrent()">☆</button>
    <div id="vol-wrap">
      <span id="vol-display">80</span>
      <input type="range" id="vol" min="0" max="100" value="80">
    </div>
    <button class="pbtn" onclick="toggleFS()">⛶</button>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings">
  <div id="settings-box">
    <div class="sth">
      <div class="sth-title">PARAMÈTRES</div>
      <button class="pbtn" onclick="closeSettings()">✕</button>
    </div>
    <div class="stb">
      <div class="st-row">
        <div class="st-label"><b>Source M3U</b>URL de la liste IPTV</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:6px">
        <button class="preset-btn" onclick="setPreset('https://iptv-org.github.io/iptv/languages/fra.m3u')">🇫🇷 France uniquement</button>
        <button class="preset-btn" onclick="setPreset('https://iptv-org.github.io/iptv/languages/eng.m3u')">🇬🇧 English channels</button>
        <button class="preset-btn" onclick="setPreset('https://iptv-org.github.io/iptv/index.m3u')">🌍 Monde entier (lent)</button>
      </div>
      <input type="text" id="m3u-input" class="st-input" placeholder="https://...">
      <div class="st-row" style="margin-top:8px">
        <div class="st-label"><b>Logos</b>Afficher les logos des chaînes</div>
        <input type="checkbox" id="show-logos" checked style="accent-color:var(--acc);width:16px;height:16px">
      </div>
      <div class="st-row">
        <div class="st-label"><b>Lignes par page</b>Pagination (moins = plus rapide)</div>
        <select id="page-size" class="st-input" style="flex:0;width:70px">
          <option value="30">30</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
        </select>
      </div>
      <div class="st-row">
        <div class="st-label"><b>Volume initial</b></div>
        <input type="range" id="init-vol" min="0" max="100" value="80" style="accent-color:var(--acc);width:100px">
        <span id="init-vol-display" style="font-size:11px;color:var(--acc);min-width:28px;text-align:right">80</span>
      </div>
    </div>
    <div class="stf">
      <button class="btn-save" onclick="saveSettings()">Sauvegarder</button>
      <button class="btn-cancel" onclick="closeSettings()">Annuler</button>
    </div>
  </div>
</div>

<!-- NOTIFICATION -->
<div id="notif">
  <div id="notif-text"></div>
  <div id="notif-sub"></div>
</div>

<!-- HLS.js chargé en dernier, de manière asynchrone -->
<script>
'use strict';

// ─── CONFIG ──────────────────────────────────────────────────────────
const DEFAULT_M3U = 'https://iptv-org.github.io/iptv/languages/fra.m3u';
const PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
];
const IS_SERVER = location.protocol !== 'file:' && location.hostname;

// ─── ÉTAT ─────────────────────────────────────────────────────────────
const S = {
  channels: [],
  filtered: [],
  cats: {},
  favs: [],
  recent: [],
  view: 'all',
  cat: null,
  query: '',
  current: null,
  currentIdx: 0,
  hls: null,
  vol: 80,
  muted: false,
  page: 0,
  pageSize: 50,
  showLogos: true,
  m3uUrl: DEFAULT_M3U,
};

// ─── LOCALSTORAGE ─────────────────────────────────────────────────────
const LS = {
  g: (k, d=null) => { try { const v=localStorage.getItem('pitv_'+k); return v!==null?JSON.parse(v):d; } catch{return d;} },
  s: (k, v)      => { try { localStorage.setItem('pitv_'+k, JSON.stringify(v)); } catch{} },
};

// ─── HELPERS ──────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]); }
function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

let _notifTO;
function notify(text, sub='', dur=3000) {
  const el=document.getElementById('notif');
  document.getElementById('notif-text').textContent=text;
  document.getElementById('notif-sub').textContent=sub;
  el.classList.add('on');
  clearTimeout(_notifTO);
  _notifTO=setTimeout(()=>el.classList.remove('on'),dur);
}

// ─── BOOT ─────────────────────────────────────────────────────────────
async function boot() {
  const bar=document.getElementById('bbar');
  const st=document.getElementById('bstatus');

  // Charge les préférences depuis localStorage (instantané)
  S.m3uUrl = LS.g('m3u', DEFAULT_M3U);
  S.favs   = LS.g('favs', []);
  S.recent = LS.g('recent', []);
  S.vol    = LS.g('vol', 80);
  S.showLogos = LS.g('logos', true);
  S.pageSize  = LS.g('psize', 50);

  bar.style.width = '30%'; st.textContent = 'Chargement des préférences...';
  await sleep(100);
  bar.style.width = '60%'; st.textContent = 'Initialisation de l\'interface...';
  await sleep(80);
  bar.style.width = '90%'; st.textContent = 'Prêt !';
  await sleep(80);
  bar.style.width = '100%';
  await sleep(180);

  document.getElementById('boot').style.display = 'none';
  document.getElementById('app').style.display   = '';
  startClock();

  // Volume
  document.getElementById('vol').value=S.vol;
  document.getElementById('vol-display').textContent=S.vol;

  // Lance le chargement M3U en arrière-plan
  showMsg('Chargement des chaînes...');
  loadM3U(S.m3uUrl);
}

// ─── M3U LOADER (streaming progressif) ────────────────────────────────
let _retries = 0;

async function loadM3U(url) {
  const IS_SERVER_MODE = IS_SERVER;
  const endpoints = IS_SERVER_MODE
    ? [`/api/proxy?url=${encodeURIComponent(url)}`, ...PROXIES.map(p=>p(url))]
    : PROXIES.map(p=>p(url));

  for (let i=0; i<endpoints.length; i++) {
    try {
      const ctrl = new AbortController();
      const to   = setTimeout(()=>ctrl.abort(), 18000);
      const resp = await fetch(endpoints[i], {signal: ctrl.signal});
      clearTimeout(to);
      if (!resp.ok) throw new Error('HTTP '+resp.status);

      // Lecture en streaming pour afficher rapidement
      const reader  = resp.body?.getReader();
      const decoder = new TextDecoder();
      let buf='', cur=null, id=0, all=[];
      let firstRender=false;

      if (reader) {
        while (true) {
          const {done,value}=await reader.read();
          if (done) break;
          buf += decoder.decode(value,{stream:true});
          const nl = buf.lastIndexOf('\n');
          if (nl<0) continue;
          const chunk=buf.slice(0,nl+1);
          buf=buf.slice(nl+1);
          for (const raw of chunk.split('\n')) {
            const line=raw.trim();
            if (!line) continue;
            if (line.startsWith('#EXTINF:')) {
              cur={id:'c'+(++id),name:'',group:'Autres',logo:'',url:''};
              const ci=line.lastIndexOf(',');
              cur.name=ci>=0?line.slice(ci+1).trim():'Ch.'+id;
              const m=(p)=>line.match(p);
              const tn=m(/tvg-name="([^"]*)"/i);
              const tl=m(/tvg-logo="([^"]*)"/i);
              const g =m(/group-title="([^"]*)"/i);
              const ti=m(/tvg-id="([^"]*)"/i);
              if(tn) cur.name =tn[1]||cur.name;
              if(tl) cur.logo =tl[1];
              if(g)  cur.group=g[1]||'Autres';
              if(ti) cur.id  ='c_'+ti[1].replace(/[^a-z0-9]/gi,'_')+'_'+id;
            } else if (cur && !line.startsWith('#') && /^https?:|^rtmps?:|^rtsp:/.test(line)) {
              cur.url=line; all.push(cur); cur=null;
              if (!firstRender && all.length>=50) {
                firstRender=true;
                S.channels=[...all];
                buildCats(); renderView();
                notify('Chargement en cours...', all.length+' chaînes affichées');
              }
            }
          }
        }
        if (buf.trim() && cur && /^https?:|^rtmps?:|^rtsp:/.test(buf.trim())) {
          cur.url=buf.trim(); all.push(cur);
        }
      } else {
        const text=await resp.text();
        all=parseM3UText(text);
      }

      if (!all.length) throw new Error('Aucune chaîne');
      S.channels=all; _retries=0;
      buildCats(); renderView();
      notify('Prêt', all.length+' chaînes chargées');
      document.getElementById('ch-count').style.display='';
      document.getElementById('ch-count').textContent=all.length+' ch.';
      return;

    } catch(e) {
      console.warn('Tentative',i+1,'échouée:',e.message);
    }
  }

  // Échec — retry auto
  _retries++;
  if (_retries<=5) {
    const delay=Math.min(5000*_retries,25000);
    notify('Erreur réseau','Retry dans '+Math.round(delay/1000)+'s…');
    setTimeout(()=>loadM3U(url), delay);
  } else {
    showMsg('Impossible de charger les chaînes. Vérifiez la source M3U dans Paramètres.');
    _retries=0;
  }
}

function parseM3UText(text) {
  const lines=text.split('\n');
  const res=[]; let cur=null, id=0;
  for (const raw of lines) {
    const line=raw.trim();
    if (!line) continue;
    if (line.startsWith('#EXTINF:')) {
      cur={id:'c'+(++id),name:'',group:'Autres',logo:'',url:''};
      const ci=line.lastIndexOf(',');
      cur.name=ci>=0?line.slice(ci+1).trim():'Ch.'+id;
      const tn=line.match(/tvg-name="([^"]*)"/i);
      const tl=line.match(/tvg-logo="([^"]*)"/i);
      const g =line.match(/group-title="([^"]*)"/i);
      if(tn) cur.name=tn[1]||cur.name;
      if(tl) cur.logo=tl[1];
      if(g)  cur.group=g[1]||'Autres';
    } else if (cur && !line.startsWith('#') && /^https?:|^rtmps?:|^rtsp:/.test(line)) {
      cur.url=line; res.push(cur); cur=null;
    }
  }
  return res;
}

// ─── CATÉGORIES ───────────────────────────────────────────────────────
function buildCats() {
  S.cats={};
  S.channels.forEach(ch=>{ S.cats[ch.group]=(S.cats[ch.group]||0)+1; });
  const el=document.getElementById('cats');
  // DocumentFragment pour 1 seul reflow
  const frag=document.createDocumentFragment();
  Object.entries(S.cats).sort((a,b)=>b[1]-a[1]).slice(0,35).forEach(([name,count])=>{
    const d=document.createElement('div');
    d.className='cat-item';
    d.textContent=name;
    const sp=document.createElement('span');
    sp.className='cat-count';
    sp.textContent=count;
    d.appendChild(sp);
    d.addEventListener('click',()=>selectCat(name));
    frag.appendChild(d);
  });
  el.innerHTML='';
  el.appendChild(frag);
}

function selectCat(name) {
  S.cat=name; S.view='cat'; S.query='';
  document.getElementById('search').value='';
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.cat-item').forEach(e=>{
    const isActive = e.firstChild?.textContent === name;
    e.classList.toggle('active', isActive);
  });
  S.page=0; renderView();
}

// ─── RENDU PRINCIPAL ──────────────────────────────────────────────────
function renderView() {
  let ch=[];
  let title='';

  switch(S.view) {
    case 'all':      ch=S.channels; title='Toutes les chaînes'; break;
    case 'favorites':ch=S.channels.filter(c=>S.favs.includes(c.id)); title='Favoris'; break;
    case 'recent':   ch=S.channels.filter(c=>S.recent.includes(c.id)); title='Récents'; break;
    case 'cat':      ch=S.channels.filter(c=>c.group===S.cat); title=S.cat; break;
    case 'search':
      const q=S.query.toLowerCase();
      ch=S.channels.filter(c=>c.name.toLowerCase().includes(q)||c.group.toLowerCase().includes(q));
      title='Résultats: "'+S.query+'"';
      break;
  }

  S.filtered=ch;

  // Section bar
  const sb=document.getElementById('section-bar');
  sb.style.display='flex';
  document.getElementById('sec-title').textContent=title;
  document.getElementById('sec-count').textContent=ch.length+' chaîne'+(ch.length!==1?'s':'');
  hideMsg();

  renderPage();
}

function renderPage() {
  const start=S.page*S.pageSize;
  const slice=S.filtered.slice(start, start+S.pageSize);
  const list=document.getElementById('ch-list');

  if (S.filtered.length===0) {
    list.innerHTML='<div class="msg">Aucune chaîne.</div>';
    document.getElementById('pagination').style.display='none';
    return;
  }

  // ── DocumentFragment : 1 seul reflow pour tout le batch ──
  const frag=document.createDocumentFragment();
  slice.forEach(ch=>{
    const row=document.createElement('div');
    row.className='ch-row'+(S.current?.id===ch.id?' playing':'');
    row.setAttribute('data-id',ch.id);

    // Logo (lazy loading natif du navigateur)
    if (S.showLogos && ch.logo) {
      const img=document.createElement('img');
      img.className='ch-logo';
      img.loading='lazy'; // lazy natif — pas de JS supplémentaire
      img.decoding='async';
      img.src=ch.logo;
      img.alt='';
      img.onerror=function(){this.style.display='none'};
      row.appendChild(img);
    } else {
      const ini=document.createElement('div');
      ini.className='ch-initial';
      ini.textContent=(ch.name[0]||'?').toUpperCase();
      row.appendChild(ini);
    }

    const name=document.createElement('div');
    name.className='ch-name';
    name.textContent=ch.name;
    row.appendChild(name);

    const grp=document.createElement('div');
    grp.className='ch-group';
    grp.textContent=ch.group;
    row.appendChild(grp);

    const fav=document.createElement('div');
    fav.className='ch-fav'+(S.favs.includes(ch.id)?' on':'');
    fav.textContent=S.favs.includes(ch.id)?'★':'☆';
    fav.addEventListener('click',e=>{e.stopPropagation();toggleFav(ch.id,fav);});
    row.appendChild(fav);

    row.addEventListener('click',()=>play(ch));
    frag.appendChild(row);
  });
  list.innerHTML='';
  list.appendChild(frag);

  renderPagination();
}

function renderPagination() {
  const total=Math.ceil(S.filtered.length/S.pageSize);
  const pg=document.getElementById('pagination');
  if (total<=1) { pg.style.display='none'; return; }
  pg.style.display='flex';

  const frag=document.createDocumentFragment();

  const prev=document.createElement('button');
  prev.className='page-btn'; prev.textContent='← Préc.';
  prev.disabled=S.page===0;
  prev.addEventListener('click',()=>{if(S.page>0){S.page--;renderPage();document.getElementById('content').scrollTop=0;}});
  frag.appendChild(prev);

  const info=document.createElement('div');
  info.className='page-info' ;
  info.style.cssText='font-size:11px;color:var(--dim);display:flex;align-items:center;padding:0 8px';
  info.textContent=(S.page+1)+' / '+total;
  frag.appendChild(info);

  const next=document.createElement('button');
  next.className='page-btn'; next.textContent='Suiv. →';
  next.disabled=S.page>=total-1;
  next.addEventListener('click',()=>{if(S.page<total-1){S.page++;renderPage();document.getElementById('content').scrollTop=0;}});
  frag.appendChild(next);

  pg.innerHTML='';
  pg.appendChild(frag);
}

function showMsg(t) {
  document.getElementById('msg-loading').textContent=t;
  document.getElementById('msg-loading').style.display='';
  document.getElementById('section-bar').style.display='none';
  document.getElementById('ch-list').innerHTML='';
  document.getElementById('pagination').style.display='none';
}
function hideMsg() {
  document.getElementById('msg-loading').style.display='none';
}

// ─── LECTURE ──────────────────────────────────────────────────────────
function play(ch) {
  S.current=ch;
  S.currentIdx=S.filtered.findIndex(c=>c.id===ch.id);
  S.recent=[ch.id,...S.recent.filter(id=>id!==ch.id)].slice(0,20);
  LS.s('recent',S.recent);

  document.getElementById('player-name').textContent=ch.name;
  document.getElementById('player-meta').textContent=ch.group;
  document.getElementById('fav-btn').textContent=S.favs.includes(ch.id)?'★':'☆';

  const pl=document.getElementById('player');
  pl.className='on loading';
  startStream(ch.url);

  // Marque visuellement la ligne active
  document.querySelectorAll('.ch-row').forEach(r=>{
    r.classList.toggle('playing',r.getAttribute('data-id')===ch.id);
  });
}

function startStream(url) {
  const video=document.getElementById('video-el');
  const pl=document.getElementById('player');
  pl.classList.remove('error');
  pl.classList.add('loading');

  if (S.hls) { S.hls.destroy(); S.hls=null; }
  video.removeAttribute('src'); video.load();
  video.volume=S.vol/100; video.muted=S.muted;

  // HLS.js disponible ?
  if (typeof Hls !== 'undefined' && Hls.isSupported()) {
    const hls=new Hls({
      enableWorker: true,
      lowLatencyMode: false,
      backBufferLength: 15,
      maxBufferLength: 15,
      maxMaxBufferLength: 30,
      manifestLoadingTimeOut: 8000,
      manifestLoadingMaxRetry: 1,
      levelLoadingTimeOut: 8000,
      fragLoadingTimeOut: 10000,
      fragLoadingMaxRetry: 1,
    });
    S.hls=hls;
    hls.loadSource(url); hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>{
      pl.classList.remove('loading');
      video.play().catch(()=>{});
    });
    hls.on(Hls.Events.ERROR,(ev,d)=>{
      if (!d.fatal) return;
      hls.destroy(); S.hls=null;
      // Tente la lecture native
      video.src=url; video.load();
      video.play().then(()=>pl.classList.remove('loading'))
        .catch(()=>showErr('Flux indisponible ou bloqué (CORS)'));
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src=url; video.load();
    video.addEventListener('loadedmetadata',()=>{pl.classList.remove('loading');video.play().catch(()=>{});},{once:true});
    video.addEventListener('error',()=>showErr('Flux indisponible'),{once:true});
  } else {
    video.src=url; video.load();
    video.play().then(()=>pl.classList.remove('loading')).catch(()=>showErr('Format non supporté'));
  }

  video.onwaiting=()=>pl.classList.add('loading');
  video.onplaying =()=>pl.classList.remove('loading');
}

function showErr(msg) {
  const pl=document.getElementById('player');
  pl.classList.remove('loading'); pl.classList.add('error');
  document.getElementById('err-msg').textContent=msg;
}

function closePlayer() {
  const pl=document.getElementById('player');
  pl.className='';
  document.getElementById('video-el').pause();
  if (S.hls){S.hls.destroy();S.hls=null;}
  document.getElementById('video-el').src='';
  S.current=null;
  document.querySelectorAll('.ch-row').forEach(r=>r.classList.remove('playing'));
}

function togglePP() {
  const v=document.getElementById('video-el');
  const btn=document.getElementById('pp-btn');
  if(v.paused){v.play();btn.textContent='⏸';}
  else{v.pause();btn.textContent='▶';}
}

function nextCh() {
  if(!S.filtered.length)return;
  S.currentIdx=(S.currentIdx+1)%S.filtered.length;
  play(S.filtered[S.currentIdx]);
}
function prevCh() {
  if(!S.filtered.length)return;
  S.currentIdx=(S.currentIdx-1+S.filtered.length)%S.filtered.length;
  play(S.filtered[S.currentIdx]);
}
function retryStream() { if(S.current)startStream(S.current.url); }
function toggleFS() {
  if(!document.fullscreenElement) document.getElementById('player').requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

// ─── FAVORIS ──────────────────────────────────────────────────────────
function toggleFav(id, btn) {
  const on=S.favs.includes(id);
  S.favs=on?S.favs.filter(f=>f!==id):[...S.favs,id];
  LS.s('favs',S.favs);
  if(btn){btn.classList.toggle('on',!on);btn.textContent=on?'☆':'★';}
  updateFavCount();
  notify(on?'Retiré des favoris':'Ajouté aux favoris');
}
function toggleFavCurrent() {
  if(!S.current)return;
  const id=S.current.id;
  const btn=document.getElementById('fav-btn');
  const on=S.favs.includes(id);
  S.favs=on?S.favs.filter(f=>f!==id):[...S.favs,id];
  LS.s('favs',S.favs);
  btn.textContent=on?'☆':'★';
  // Met à jour la ligne dans la liste
  const rowFav=document.querySelector(`.ch-row[data-id="${id}"] .ch-fav`);
  if(rowFav){rowFav.classList.toggle('on',!on);rowFav.textContent=on?'☆':'★';}
  updateFavCount();
}
function updateFavCount() {
  const item=document.querySelector('[data-view="favorites"]');
  if(item) item.textContent='★ Favoris ('+S.favs.length+')';
}

// ─── NAVIGATION ───────────────────────────────────────────────────────
document.querySelectorAll('.nav-item').forEach(item=>{
  item.addEventListener('click',()=>{
    document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
    document.querySelectorAll('.cat-item').forEach(e=>e.classList.remove('active'));
    item.classList.add('active');
    S.view=item.dataset.view; S.cat=null; S.query=''; S.page=0;
    document.getElementById('search').value='';
    renderView();
  });
});

let _searchTO;
document.getElementById('search').addEventListener('input',e=>{
  clearTimeout(_searchTO);
  _searchTO=setTimeout(()=>{
    S.query=e.target.value.trim(); S.page=0;
    S.view=S.query?'search':'all';
    renderView();
  },300);
});

document.getElementById('refresh-btn').addEventListener('click',()=>{
  S.channels=[]; S.page=0;
  showMsg('Chargement...');
  loadM3U(S.m3uUrl);
});

// ─── VOLUME ───────────────────────────────────────────────────────────
document.getElementById('vol').addEventListener('input',e=>{
  S.vol=+e.target.value;
  document.getElementById('vol-display').textContent=S.vol;
  document.getElementById('video-el').volume=S.vol/100;
});

// ─── CLAVIER ──────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const playerOn=document.getElementById('player').classList.contains('on');
  if (playerOn) {
    if(e.key==='Escape'||e.key==='Backspace')closePlayer();
    else if(e.key===' '){e.preventDefault();togglePP();}
    else if(e.key==='ArrowRight')nextCh();
    else if(e.key==='ArrowLeft')prevCh();
    else if(e.key==='ArrowUp'){S.vol=Math.min(100,S.vol+5);document.getElementById('vol').value=S.vol;document.getElementById('vol-display').textContent=S.vol;document.getElementById('video-el').volume=S.vol/100;}
    else if(e.key==='ArrowDown'){S.vol=Math.max(0,S.vol-5);document.getElementById('vol').value=S.vol;document.getElementById('vol-display').textContent=S.vol;document.getElementById('video-el').volume=S.vol/100;}
    else if(e.key==='f'||e.key==='F')toggleFS();
    else if(e.key==='m'||e.key==='M'){S.muted=!S.muted;document.getElementById('video-el').muted=S.muted;}
    return;
  }
  if(e.key==='/'||e.key==='s'){document.getElementById('search').focus();e.preventDefault();}
});

// ─── SETTINGS ─────────────────────────────────────────────────────────
document.getElementById('settings-btn').addEventListener('click',()=>{
  document.getElementById('m3u-input').value=S.m3uUrl;
  document.getElementById('show-logos').checked=S.showLogos;
  document.getElementById('page-size').value=S.pageSize;
  document.getElementById('init-vol').value=S.vol;
  document.getElementById('init-vol-display').textContent=S.vol;
  document.getElementById('settings').classList.add('on');
});
document.getElementById('init-vol').addEventListener('input',e=>{
  document.getElementById('init-vol-display').textContent=e.target.value;
});
function closeSettings(){document.getElementById('settings').classList.remove('on');}
function saveSettings(){
  const newUrl=document.getElementById('m3u-input').value.trim()||DEFAULT_M3U;
  const urlChanged=newUrl!==S.m3uUrl;
  S.m3uUrl=newUrl; LS.s('m3u',S.m3uUrl);
  S.showLogos=document.getElementById('show-logos').checked; LS.s('logos',S.showLogos);
  S.pageSize=+document.getElementById('page-size').value; LS.s('psize',S.pageSize);
  S.vol=+document.getElementById('init-vol').value; LS.s('vol',S.vol);
  document.getElementById('vol').value=S.vol;
  document.getElementById('vol-display').textContent=S.vol;
  document.getElementById('video-el').volume=S.vol/100;
  closeSettings();
  if(urlChanged){S.channels=[];S.page=0;showMsg('Chargement nouvelle source...');loadM3U(S.m3uUrl);}
  else{renderPage();}
  notify('Paramètres sauvegardés');
}
function setPreset(url){document.getElementById('m3u-input').value=url;}
document.getElementById('settings').addEventListener('click',e=>{
  if(e.target===document.getElementById('settings'))closeSettings();
});

// ─── HORLOGE ──────────────────────────────────────────────────────────
function startClock(){
  const cl=document.getElementById('clock');
  function tick(){
    const n=new Date();
    cl.textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
  }
  tick();
  // Intervalle de 30s (pas 1s) = moins de travail pour le Pi
  setInterval(tick,30000);
}

// ─── CHARGEMENT HLS.JS (asynchrone, non bloquant) ─────────────────────
// Chargé après le boot pour ne pas bloquer l'affichage initial
function loadHLS(cb) {
  if (typeof Hls !== 'undefined') { cb(); return; }
  const s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.light.min.js'; // version LIGHT
  s.onload=cb; s.onerror=cb; // cb() même en erreur : fallback natif
  document.head.appendChild(s);
}

// ─── INIT ─────────────────────────────────────────────────────────────
// Pré-charge HLS.js en parallèle du boot (non bloquant)
loadHLS(()=>{ console.log('HLS.js prêt'); });
boot();
</script>
